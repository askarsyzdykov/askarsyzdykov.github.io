<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Page not found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fa;
      color: #102a43;
    }

    main {
      max-width: 36rem;
      padding: 2rem;
      text-align: center;
    }

    a {
      color: #0b7285;
    }
  </style>
  <script>
    (function () {
      if (window.location.hostname === "blog.evpoint.kz") {
        var target = "https://evpoint.kz/blog" + window.location.pathname + window.location.search + window.location.hash;
        window.location.replace(target);
      }
    }());
  </script>
</head>
<body>
  <main>
    <h1>Page not found</h1>
    <p>The page you requested does not exist.</p>
    <p><a href="/">Go to evPoint.kz</a></p>
  </main>
</body>
</html>
