title: "evPoint.kz"
description: "Карта зарядных станций для электромобилей в Казахстане, блог об электромобилях и каталог операторов зарядной инфраструктуры."
url: "https://evpoint.kz"
baseurl: "/blog"
logo: "/favicon.svg"

theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

author:
  name: Askar Syzdykov
email: info@evpoint.kz

# 🗺️ Локализация (для поиска)
lang: "ru"
