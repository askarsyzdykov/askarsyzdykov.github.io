social:
  name: evPoint.kz
  links:
    - https://evpoint.kz

# 🔍 Дополнительно: чтобы GitHub Pages не ругался
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - CNAME
  - robots.txt
  - Dockerfile
  - docker-compose.yml
  - .DS_Store
